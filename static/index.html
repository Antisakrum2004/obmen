<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Зарплатный обзор — 1С-АйтиЛаб</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0F17;--bg1:#111827;--bg2:#151C2C;--bg3:#1E293B;--bg-hover:#192236;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);--border-accent:rgba(59,130,246,.35);--text:#F3F7FF;--text2:#A1AEC3;--text3:#6B7A90;--accent:#4f8bff;--accent-hover:#60A5FA;--green:#22d47e;--red:#ff4f6a;--yellow:#f5a623;--cyan:#00d4ff;--orange:#ff8c42;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--glass:rgba(11,15,23,.88);--glass-border:rgba(148,163,184,.08);--shadow-card:0 2px 8px rgba(0,0,0,.18),0 8px 24px rgba(0,0,0,.22);--shadow-card-hover:0 4px 12px rgba(0,0,0,.22),0 12px 32px rgba(0,0,0,.30);--shadow-btn:0 1px 3px rgba(0,0,0,.20),0 2px 8px rgba(0,0,0,.15);--shadow-btn-hover:0 2px 6px rgba(0,0,0,.25),0 4px 12px rgba(0,0,0,.20);--highlight:inset 0 1px 0 rgba(255,255,255,.05);--highlight-strong:inset 0 1px 0 rgba(255,255,255,.07);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow-x:hidden;letter-spacing:.2px;line-height:1.55}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 80%,rgba(18,48,95,.35),transparent),
    radial-gradient(ellipse 60% 40% at 85% 15%,rgba(22,55,100,.25),transparent),
    linear-gradient(180deg,#070a12 0%,#0B0F17 100%)}
body>*{position:relative;z-index:1}
.topbar{position:sticky;top:0;z-index:100;background:rgba(11,15,23,.82);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.05em}
.bdot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 20px var(--accent)}}
.topbar-r{display:flex;align-items:center;gap:8px}
.mode-toggle{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);transition:all .15s;user-select:none}
.mode-toggle:hover{border-color:var(--border2)}
.mode-toggle.mock{color:var(--yellow);border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.08)}
.mode-toggle.live{color:var(--green);border-color:rgba(34,212,126,.3);background:rgba(34,212,126,.08)}
.tabs{display:flex;gap:4px}
.tab-btn{padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text3);background:rgba(18,21,31,.6);border:1px solid var(--glass-border);border-radius:8px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .15s;box-shadow:var(--shadow-btn),var(--highlight)}
.tab-btn:hover{color:var(--text2);border-color:var(--border2);transform:translateY(-1px)}
.tab-btn.active{color:#fff;background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(79,139,255,.25),var(--highlight)}
.gear{width:32px;height:32px;background:rgba(18,21,31,.6);border:1px solid var(--glass-border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;position:relative;user-select:none;box-shadow:var(--shadow-btn),var(--highlight)}
.gear:hover{border-color:var(--accent);transform:translateY(-1px)}.gear.active{border-color:var(--yellow)}
.gdot{position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--yellow);border:2px solid var(--bg)}.gdot.hide{display:none}
.spanel{position:sticky;top:52px;z-index:99;background:rgba(11,15,23,.85);border-bottom:1px solid var(--glass-border);overflow:hidden;max-height:0;transition:max-height .3s,padding .3s;padding:0 24px}
.spanel.open{max-height:140px;padding:14px 24px}
.si{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}.sf{flex:1;min-width:200px}
.sf label{display:block;font-family:var(--mono);font-size:10px;color:var(--yellow);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.si input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 11px;outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:inset 0 1px 3px rgba(0,0,0,.20)}
.si input:focus{border-color:var(--border-accent);box-shadow:inset 0 1px 3px rgba(0,0,0,.20),0 0 0 3px rgba(79,139,255,.10)}
.bsave{background:var(--yellow);color:#000;border:none;border-radius:8px;padding:8px 16px;font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:19px;box-shadow:var(--shadow-btn);transition:all .15s}.bsave:hover{opacity:.85;transform:translateY(-1px)}
.main{padding:20px 24px 60px;max-width:1400px;margin:0 auto}
.tab-content{display:none}.tab-content.active{display:block}
.version{font-family:var(--mono);font-size:10px;color:var(--text3);opacity:.5}
</style>
</head>
<body>

<!-- Верхняя панель -->
<div class="topbar">
  <div class="brand">
    <span class="bdot"></span>
    Зарплатный обзор
    <span class="version" id="appVersion"></span>
  </div>
  <div class="topbar-r">
    <div class="mode-toggle" id="modeToggle" onclick="toggleMockMode()">
      <span id="modeLabel">МОК</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tabBtn0" onclick="switchTab(0)">Обзор</button>
    </div>
    <button class="gear" id="gear" onclick="toggleS()">&#9881;<span class="gdot" id="gd"></span></button>
  </div>
</div>

<!-- Панель настроек -->
<div class="spanel" id="sp">
  <div class="si">
    <div class="sf">
      <label>URL вебхука Bitrix24</label>
      <input type="text" id="hi" placeholder="https://1c-cms.bitrix24.ru/rest/116/...">
    </div>
    <button class="bsave" onclick="saveH()">Сохранить</button>
  </div>
  <div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--text3)">
    Вебхук зашит по умолчанию. Нажмите МОК/ЖИВОЙ для переключения режима данных.
    В режиме МОК — тестовые данные, в ЖИВОЙ — реальные из Bitrix24.
  </div>
</div>

<!-- Основное содержимое -->
<div class="main">
  <div class="tab-content active" id="tab0">
    <div id="pr-container"></div>
  </div>
</div>

<!-- Скрипты: cache layer (v8.0.0 TRUE ELAPSED-FIRST) -->
<script src="js/payroll/payroll-cache.js?v=8.1.0"></script>

<!-- Скрипты: доменные модули (v2.0.0 hardening) -->
<script src="js/payroll/payroll-domain.js?v=8.1.0"></script>
<script src="js/payroll/payroll-normalizer.js?v=8.1.0"></script>
<script src="js/payroll/payroll-review-engine.js?v=8.1.0"></script>
<script src="js/payroll/payroll-projection.js?v=8.1.1"></script>
<script src="js/payroll/payroll-storage.js?v=8.1.0"></script>
<script src="js/payroll/payroll-export.js?v=8.1.0"></script>

<!-- Скрипты: core + mock (DEPRECATED legacy calc/storage/export REMOVED) -->
<script src="js/core.js?v=8.1.0"></script>
<script src="js/mock-data.js?v=8.1.0"></script>
<script src="js/payroll-review-styles.js?v=8.5.0"></script>
<script src="js/tab-payroll-review.js?v=8.5.0"></script>

<script>
function switchTab(t) {
  if (window.TabPayrollReview) {
    window.TabPayrollReview.render(document.getElementById('pr-container'));
  }
}

function toggleS() {
  var sp = document.getElementById('sp');
  var gear = document.getElementById('gear');
  sp.classList.toggle('open');
  gear.classList.toggle('active');
}

function toggleMockMode() {
  PR_MOCK_MODE = !PR_MOCK_MODE;
  PR_FORCE_MOCK = PR_MOCK_MODE;
  updateModeUI();
  if (window.TabPayrollReview) window.TabPayrollReview.refresh();
}

function updateModeUI() {
  var toggle = document.getElementById('modeToggle');
  var label = document.getElementById('modeLabel');
  if (PR_MOCK_MODE) {
    toggle.className = 'mode-toggle mock';
    label.textContent = 'МОК';
  } else {
    toggle.className = 'mode-toggle live';
    label.textContent = 'ЖИВОЙ';
  }
}

function saveH() {
  var v = document.getElementById('hi').value.trim();
  if (!v || !v.includes('bitrix24')) {
    alert('Неверный URL вебхука');
    return;
  }
  HOOK = v.endsWith('/') ? v : v + '/';
  /* Сохраняем через PayrollStorage — единая точка доступа */
  if (typeof PayrollStorage !== 'undefined' && PayrollStorage.saveHook) {
    PayrollStorage.saveHook(HOOK);
  }
  PR_MOCK_MODE = false;
  PR_FORCE_MOCK = false;
  updateModeUI();
  toggleS();
  if (window.TabPayrollReview) window.TabPayrollReview.refresh();
}

document.addEventListener('DOMContentLoaded', function() {
  var vEl = document.getElementById('appVersion');
  if (vEl && typeof APP_VERSION !== 'undefined') vEl.textContent = APP_VERSION;

  if (HOOK) {
    document.getElementById('hi').value = HOOK;
  }

  updateModeUI();

  if (window.TabPayrollReview) {
    window.TabPayrollReview.render(document.getElementById('pr-container'));
  }

  document.addEventListener('click', function(e) {
    var sp = document.getElementById('sp');
    var gear = document.getElementById('gear');
    if (sp.classList.contains('open') && !e.target.closest('#sp') && !e.target.closest('#gear')) {
      sp.classList.remove('open');
      gear.classList.remove('active');
    }
  });
});
</script>
</body>
</html>
